<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabela Premium</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        background: #0b0b0b;
        font-family: "Montserrat", sans-serif;
        color: #fff;
        display: flex;
        justify-content: center;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        width: 100%;
        background: linear-gradient(145deg, #111, #1a1a1a);
        border: 3px solid #c9a646;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(201, 166, 70, 0.3);
        padding: 20px;
      }

      .header {
        text-align: center;
        font-weight: 900;
        font-size: 22px;
        color: #f5d06f;
      }

      .subheader {
        text-align: center;
        font-size: 12px;
        color: #ccc;
        margin-bottom: 20px;
      }

      .lista-produtos {
        border-bottom: 1px dashed #444;
        padding: 10px 0;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .name {
        font-size: 14px;
        flex: 1;
        word-break: break-word;
      }

      .price {
        color: #f5d06f;
        font-weight: bold;
        white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">TABELA PREMIUM</div>
      <div id="lista-produtos"></div>

            <!-- FOOTER -->
      <div class="footer">
        <div class="footer-item">
          <span class="footer-icon">💳</span>
          Pagamento via Pix
        </div>
        <div class="footer-item">
          <span class="footer-icon">💰</span>
          Cartão com taxas adicionais
        </div>
        <div class="footer-item">
          <span class="footer-icon">📊</span>
          Parcelamento disponível
        </div>
      </div>

      <div class="warning">⚠️ Tabela válida enquanto durar o estoque</div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal" onclick="closeModal()">
      <span class="close">×</span>
      <img id="modalImg" />
    </div>
    </div>
    

    <script>
      function openModal(src) {
        const img = document.getElementById("modalImg");
        img.src = src;
        document.getElementById("modal").classList.add("active");
      }

      function closeModal() {
        document.getElementById("modal").classList.remove("active");
      }

      const sheetId = "1lUdNf99DFDRqibMtdHQcigDaM5FzKP87KRTyDNd_lxY";
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

      async function carregarDados() {
        try {
          const resposta = await fetch(url);
          const texto = await resposta.text();

          const inicio = texto.indexOf("{");
          const fim = texto.lastIndexOf("}") + 1;
          const jsonString = texto.substring(inicio, fim);

          const json = JSON.parse(jsonString);

          const colunas = json.table.cols.map((col) => col.label);
          const dadosFormatados = json.table.rows.map((row) => {
            let objeto = {};
            row.c.forEach((cell, i) => {
              objeto[colunas[i] || `coluna_${i}`] = cell ? cell.v : null;
            });
            return objeto;
          });

          return dadosFormatados;
        } catch (erro) {
          console.error("Erro:", erro);
          return null;
        }
      }

      carregarDados().then((dados) => {
        const container = document.getElementById("lista-produtos");

        if (!dados) {
          container.innerHTML = "Erro ao carregar.";
          return;
        }

        container.innerHTML = dados
          .map(
            (item) => `
        <div class="item">
          <div class="top">
            <div class="name">${item.nome || item.produto || "Produto"}</div>
            <div class="price">R$ ${item.preco || item.valor || "-"}</div>
          </div>

          ${
            item.imagem
              ? `<div class="link" onclick="openModal('${item.imagem}')">Mostrar foto</div>`
              : ""
          }
        </div>
      `,
          )
          .join("");
      });
    </script>
  </body>
</html>
